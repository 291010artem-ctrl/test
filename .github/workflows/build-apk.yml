name: Build companion APK

# Собирает APK телефонного приложения-компаньона (камера → панель).
# Запуск вручную из вкладки Actions. Можно задать имя приложения, package
# и адрес панели по умолчанию — они будут зашиты в APK.

on:
  push:
    branches: ["claude/remote-phone-control-panel-2tpseh"]
    paths:
      - "remote-control/android-companion/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:
    inputs:
      app_name:
        description: "Название приложения"
        required: false
        default: "Camera Companion"
      application_id:
        description: "Package (applicationId), напр. com.artem.cameracompanion"
        required: false
        default: "com.artem.cameracompanion"
      default_server:
        description: "Адрес панели по умолчанию (IP:порт), необязательно"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: remote-control/android-companion
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.2"

      - name: Inject build parameters
        run: |
          cat > build.properties.generated <<EOF
          ARP_APP_NAME=${{ github.event.inputs.app_name }}
          ARP_APPLICATION_ID=${{ github.event.inputs.application_id }}
          ARP_PERMISSIONS=CAMERA
          ARP_DEFAULT_SERVER=${{ github.event.inputs.default_server }}
          EOF

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: camera-companion-apk
          path: remote-control/android-companion/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
