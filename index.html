<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мир Кирпи и Гофера — добрые истории для детей</title>
  <meta name="description" content="Добрые истории, сказки и приключения для детей и их родителей." />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; overflow-x: hidden; }
    body { background: #fdf7e6; font-family: "Nunito", "Segoe UI", Arial, sans-serif; }

    /* Картинка во всю ширину браузера, в своих пропорциях:
       без полос по бокам, без обрезки, без растяжения. */
    .page {
      position: relative;
      width: 100%;
      line-height: 0;
    }
    .page img {
      width: 100%;
      height: auto;
      display: block;
      image-rendering: -webkit-optimize-contrast;
    }

    /* Прозрачные ссылки-«горячие зоны». Координаты в % от картинки. */
    .hot {
      position: absolute;
      display: block;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .hot:hover {
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 0 3px rgba(123, 164, 40, 0.7);
    }
    /* прямоугольные зоны (карточки) — со скруглением поменьше */
    .hot.card { border-radius: 18px; }
    /* круглые зоны (аватары героев) */
    .hot.round { border-radius: 50%; }
  </style>
</head>
<body>
  <div class="page">
    <img src="assets/home.jpg" alt="Мир Кирпи и Гофера" />

    <!-- ВЕРХНЕЕ МЕНЮ -->
    <a class="hot" href="index.html"        style="left:31.6%; top:5.7%; width:6.4%; height:4%;"  title="Главная"></a>

    <a class="hot" href="#"                  style="left:51.3%; top:5.7%; width:3.8%; height:4%;"  title="Игры"></a>
    <a class="hot" href="#"                  style="left:57.2%; top:5.7%; width:5.2%; height:4%;"  title="Раскраски"></a>
    <a class="hot" href="#"                  style="left:63.8%; top:5.7%; width:5.4%; height:4%;"  title="Родителям"></a>

    <!-- ГЛАВНЫЕ КНОПКИ -->
    <a class="hot" href="#"                  style="left:39.2%; top:32.8%; width:22%; height:7.6%;" title="Читать истории"></a>
    <a class="hot" href="#"                  style="left:39.2%; top:43.1%; width:22%; height:7.5%;" title="Слушать сказки"></a>

    <!-- КАРТОЧКИ РАЗДЕЛОВ -->
    <a class="hot card" href="#"             style="left:5%;    top:57%; width:22%; height:14%;"  title="Истории"></a>
    <a class="hot card" href="#"             style="left:28%;   top:57%; width:22%; height:14%;"  title="Аудиосказки"></a>
    <a class="hot card" href="#"             style="left:51%;   top:57%; width:22%; height:14%;"  title="Игры"></a>
    <a class="hot card" href="#"             style="left:74%;   top:57%; width:21%; height:14%;"  title="Раскраски"></a>

    <!-- АВАТАРЫ ДРУЗЕЙ (круглые зоны) -->
    <a class="hot round" href="characters.html" style="left:5.6%;  top:75.5%; width:8%; height:14.5%;" title="Кирпи"></a>
    <a class="hot round" href="characters.html" style="left:16.6%; top:75.5%; width:8%; height:14.5%;" title="Гофер"></a>
    <a class="hot round" href="characters.html" style="left:27.6%; top:75.5%; width:8%; height:14.5%;" title="Тиса"></a>
    <a class="hot round" href="characters.html" style="left:38.6%; top:75.5%; width:8%; height:14.5%;" title="Лулу"></a>
    <a class="hot round" href="characters.html" style="left:49.6%; top:75.5%; width:8%; height:14.5%;" title="Соня"></a>

    <!-- КНОПКА «ВСЕ ПЕРСОНАЖИ» -->

  </div>
</body>
</html>
