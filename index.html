  <meta name="description" content="Добрые истории, сказки и приключения для детей и их родителей." />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; overflow-x: hidden; }
    body { background: #fdf7e6; font-family: "Nunito", "Segoe UI", Arial, sans-serif; }

    /* Картинка во всю ширину браузера, в своих пропорциях:
       без полос по бокам, без обрезки, без растяжения. */
    .page {
      position: relative;
      width: 100%;
      line-height: 0;
    }
    .page img {
      width: 100%;
      height: auto;
      display: block;
      image-rendering: -webkit-optimize-contrast;
    }

    /* Прозрачные ссылки-«горячие зоны». Координаты в % от картинки. */
    .hot {
      position: absolute;
      display: block;
      border-radius: 12px;
      cursor: pointer;
      /* подсветка при наведении, чтобы было видно что кликается */
      transition: background 0.15s, box-shadow 0.15s;
    }
    .hot:hover {
      background: rgba(255, 255, 255, 0.18);
      box-shadow: 0 0 0 2px rgba(123, 164, 40, 0.5);
    }
  </style>
</head>
