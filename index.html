  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fdf7e6; font-family: "Nunito", "Segoe UI", Arial, sans-serif; }

    /* Картинка главной страницы 1-в-1 + кликабельные зоны поверх */
    .page {
      position: relative;
      max-width: 1280px;
      margin: 0 auto;
      line-height: 0;
    }
    .page img { width: 100%; height: auto; display: block; }

    /* Прозрачные ссылки-«горячие зоны». Координаты в % от картинки. */
    .hot {
      position: absolute;
      display: block;
      border-radius: 12px;
      cursor: pointer;
      /* подсветка при наведении, чтобы было видно что кликается */
      transition: background 0.15s, box-shadow 0.15s;
    }
    .hot:hover {
      background: rgba(255, 255, 255, 0.18);
      box-shadow: 0 0 0 2px rgba(123, 164, 40, 0.5);
    }
  </style>
</head>
