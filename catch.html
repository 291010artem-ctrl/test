<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Поймай друга — Мир Кирпи и Гофера</title>
  <style>
    :root{--green:#6e9d2f;--green-d:#5a8423;--orange:#e8932e;--orange-d:#d97e16;--ink:#5a4a34;--muted:#9a8a72;--shadow:0 10px 30px rgba(120,100,60,.16)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Nunito","Segoe UI",Arial,sans-serif;color:var(--ink);background:#fdf4ea;overflow-x:hidden}
    a{text-decoration:none;color:inherit}img{display:block}
    .header{display:flex;align-items:center;gap:24px;padding:10px 30px;background:#fffdf6;border-bottom:2px solid #f1e8d0;position:sticky;top:0;z-index:30}
    .logo{display:flex;align-items:center;gap:9px}.logo-imgs{display:flex;flex-shrink:0}
    .logo-imgs img{width:40px;height:40px;border-radius:50%;border:2px solid #fff;object-fit:cover;box-shadow:0 2px 6px rgba(90,74,52,.25)}
    .logo-imgs img:nth-child(2){margin-left:-14px}
    .logo-text{display:flex;flex-direction:column;line-height:1.02}
    .logo-text b{font-size:1.45rem;font-weight:900}.logo-text .g{color:var(--green)}.logo-text .o{color:var(--orange)}
    .logo-text small{font-size:.62rem;font-weight:800;color:#5a4a34}
    .nav{display:flex;gap:6px;margin:0 auto;flex-wrap:wrap;justify-content:center}
    .nav a{padding:8px 16px;border-radius:999px;font-weight:800;color:var(--ink)}
    .nav a:hover{background:#f3ecd6}.nav a.active{background:#f6e3a8;color:var(--green-d)}
    .actions{display:flex;gap:14px}.actions a{display:flex;flex-direction:column;align-items:center;font-size:1.3rem}
    .actions small{font-size:.62rem;font-weight:800;color:var(--muted)}

    .page-title{text-align:center;padding:14px 20px 2px}
    .page-title h1{font-size:clamp(1.7rem,4.5vw,2.6rem);font-weight:900}.page-title h1 .o{color:var(--orange)}
    .page-title p{color:var(--muted);font-weight:700;margin-top:4px}

    .bar{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin:12px auto 10px}
    .chip{background:#fff;border:2px solid #eadfbf;border-radius:999px;padding:8px 18px;font-weight:800;box-shadow:var(--shadow)}
    .chip b{color:var(--green-d)}
    .btn{cursor:pointer;border:none;display:inline-flex;align-items:center;gap:8px;padding:11px 26px;border-radius:999px;color:#fff;font-weight:800;font-size:1.05rem;background:linear-gradient(180deg,var(--orange),var(--orange-d));box-shadow:var(--shadow)}
    .btn:hover{filter:brightness(1.06)}

    .grid{max-width:560px;margin:0 auto;padding:0 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .hole{aspect-ratio:1;background:#eadfc4;border:3px solid #e0d3b0;border-radius:50%;position:relative;overflow:hidden;box-shadow:inset 0 6px 14px rgba(120,100,60,.25)}
    .hole img{position:absolute;left:8%;top:100%;width:84%;height:84%;border-radius:50%;object-fit:cover;cursor:pointer;
      transition:top .15s ease;box-shadow:0 4px 10px rgba(0,0,0,.2)}
    .hole.up img{top:8%}
    .hole img:active{transform:scale(.92)}

    .center{text-align:center;margin:18px auto 0}
    .win{max-width:520px;margin:16px auto 0;padding:0 16px;text-align:center;display:none}
    .win.show{display:block}
    .win .box{background:#fff;border:3px solid #bcd98f;border-radius:22px;padding:24px;box-shadow:var(--shadow)}
    .win h2{font-size:1.7rem;color:var(--green-d)}.win p{color:var(--muted);font-weight:700;margin:6px 0 16px}

    .foot{display:flex;justify-content:center;margin:26px 0 50px}
    .back-home{display:inline-flex;padding:12px 28px;border-radius:999px;font-weight:800;color:#fff;background:linear-gradient(180deg,var(--green),var(--green-d));box-shadow:var(--shadow)}
    @media(max-width:980px){.header{flex-wrap:wrap;gap:8px}.nav{order:3;width:100%}}
  </style>
  <link rel="stylesheet" href="assets/theme.css?v=14" />
  <script src="assets/theme.js?v=14"></script>
</head>
<body>
  <header class="header">
    <a class="logo" href="index.html">
      <span class="logo-imgs"><img src="assets/parts/av_kirpi.jpg" alt=""><img src="assets/parts/av_gofer.jpg" alt=""></span>
      <span class="logo-text"><b><span class="g">Kirpi</span><span class="o">Gofer</span></b><small>мир добрых приключений</small></span>
    </a>
    <nav class="nav">
      <a href="index.html">Главная</a><a href="#">Истории</a><a href="characters.html">Персонажи</a>
      <a href="games.html">Игры</a><a href="coloring.html">Раскраски</a><a href="stickers.html">Копилка</a><a href="parents.html">Родителям</a>
    </nav>
    <div class="actions"><a href="#">🔍<small>Поиск</small></a></div>
  </header>

  <div class="page-title">
    <h1>🌟 Поймай <span class="o">друга</span>!</h1>
    <p>Друзья выглядывают из норок — успей нажать на них!</p>
  </div>

  <div class="bar">
    <div class="chip">Очки: <b id="score">0</b></div>
    <div class="chip">Время: <b id="time">30</b></div>
    <button class="btn" id="start">▶ Играть</button>
  </div>

  <div class="grid" id="grid"></div>

  <div class="win" id="win"><div class="box">
    <h2>🎉 Молодец!</h2>
    <p>Ты поймал друзей: <b id="finalScore">0</b> раз!</p>
    <button class="btn" id="again">Сыграть ещё 🌟</button>
  </div></div>

  <div class="foot"><a class="back-home" href="games.html">← К играм</a></div>

  <script>
    const avatars=["kirpi","gofer","tisa","lulu","sonya","borik","bruno"];
    const grid=document.getElementById('grid');
    const scoreEl=document.getElementById('score'), timeEl=document.getElementById('time');
    const winBox=document.getElementById('win');
    let holes=[], score=0, time=30, running=false, tickT=null, popT=null;

    for(let i=0;i<9;i++){
      const h=document.createElement('div'); h.className='hole';
      const img=document.createElement('img'); img.alt='друг';
      img.addEventListener('click',()=>{ if(running && h.classList.contains('up')){ h.classList.remove('up'); score++; scoreEl.textContent=score; if(window.KG)KG.match(); }});
      h.appendChild(img); grid.appendChild(h); holes.push(h);
    }

    function pop(){
      if(!running) return;
      // спрячем все, покажем 1-2 случайных
      const n = Math.random()<0.35?2:1;
      const idxs=[...Array(9).keys()].sort(()=>Math.random()-0.5).slice(0,n);
      holes.forEach(h=>h.classList.remove('up'));
      idxs.forEach(i=>{
        const a=avatars[Math.floor(Math.random()*avatars.length)];
        holes[i].querySelector('img').src=`assets/parts/av_${a}.jpg`;
        holes[i].classList.add('up');
      });
      popT=setTimeout(()=>{holes.forEach(h=>h.classList.remove('up')); if(running) setTimeout(pop, 250+Math.random()*250);}, 750-Math.min(400,(30-time)*12));
    }

    function start(){
      score=0; time=30; running=true; scoreEl.textContent=0; timeEl.textContent=30; winBox.classList.remove('show');
      document.getElementById('start').textContent='Идёт игра…';
      clearInterval(tickT); clearTimeout(popT);
      pop();
      tickT=setInterval(()=>{ time--; timeEl.textContent=time;
        if(time<=0){ end(); } }, 1000);
    }
    function end(){
      running=false; clearInterval(tickT); clearTimeout(popT);
      holes.forEach(h=>h.classList.remove('up'));
      document.getElementById('start').textContent='▶ Играть снова';
      document.getElementById('finalScore').textContent=score;
      winBox.classList.add('show');
      if(window.KG){ const pool=Object.keys(KG.heroes); KG.award(pool[Math.floor(Math.random()*pool.length)]); }
    }
    document.getElementById('start').onclick=start;
    document.getElementById('again').onclick=start;
  </script>
  <script src="assets/kg.js?v=14"></script>
</body>
</html>
