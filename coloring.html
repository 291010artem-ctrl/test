<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Раскраски — Мир Кирпи и Гофера</title>
  <style>
    :root{
      --green:#6e9d2f; --green-d:#5a8423; --orange:#e8932e; --orange-d:#d97e16;
      --ink:#5a4a34; --muted:#9a8a72; --shadow:0 10px 30px rgba(120,100,60,.16);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Nunito","Segoe UI",Arial,sans-serif;color:var(--ink);background:#fdf4ea;overflow-x:hidden}
    a{text-decoration:none;color:inherit}
    img{display:block}

    .header{display:flex;align-items:center;gap:24px;padding:10px 30px;background:#fffdf6;
      border-bottom:2px solid #f1e8d0;position:sticky;top:0;z-index:30}
    .logo{display:flex;align-items:center;gap:9px}
    .logo-imgs{display:flex;flex-shrink:0}
    .logo-imgs img{width:40px;height:40px;border-radius:50%;border:2px solid #fff;object-fit:cover;box-shadow:0 2px 6px rgba(90,74,52,.25)}
    .logo-imgs img:nth-child(2){margin-left:-14px}
    .logo-text{display:flex;flex-direction:column;line-height:1.02}
    .logo-text b{font-size:1.45rem;font-weight:900;letter-spacing:.3px}
    .logo-text .g{color:var(--green)}.logo-text .o{color:var(--orange)}
    .logo-text small{font-size:.62rem;font-weight:800;color:#5a4a34;letter-spacing:.3px}
    .nav{display:flex;gap:6px;margin:0 auto;flex-wrap:wrap;justify-content:center}
    .nav a{padding:8px 16px;border-radius:999px;font-weight:800;font-size:1rem;color:var(--ink)}
    .nav a:hover{background:#f3ecd6}
    .nav a.active{background:#f6e3a8;color:var(--green-d)}
    .actions{display:flex;gap:14px}
    .actions a{display:flex;flex-direction:column;align-items:center;font-size:1.3rem;color:var(--ink)}
    .actions small{font-size:.62rem;font-weight:800;color:var(--muted)}

    .page-title{text-align:center;padding:22px 20px 2px}
    .page-title h1{font-size:clamp(1.9rem,5vw,3rem);font-weight:900}
    .page-title h1 .o{color:var(--orange)}
    .page-title p{color:var(--muted);font-weight:700;margin-top:6px}

    .wrap{max-width:1040px;margin:14px auto 40px;padding:0 16px;display:grid;
      grid-template-columns:1fr 260px;gap:22px;align-items:start}

    /* Холст */
    .stage{position:relative;background:#fff;border:3px solid #eadfbf;border-radius:22px;
      overflow:hidden;box-shadow:var(--shadow);touch-action:none}
    .stage canvas{display:block;width:100%;height:auto}
    .stage .guide{position:absolute;inset:0;width:100%;height:100%;
      mix-blend-mode:multiply;pointer-events:none}

    /* Панель инструментов */
    .tools{background:#fff;border:3px solid #eadfbf;border-radius:22px;padding:16px;box-shadow:var(--shadow)}
    .tools h3{font-size:1rem;margin:2px 0 10px;color:var(--green-d)}
    .palette{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
    .sw{width:100%;aspect-ratio:1;border-radius:50%;border:3px solid #fff;cursor:pointer;
      box-shadow:0 2px 6px rgba(0,0,0,.15);transition:transform .12s}
    .sw:hover{transform:scale(1.1)}
    .sw.active{outline:3px solid var(--green);outline-offset:1px}
    .row{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-weight:800;font-size:.9rem}
    .row input[type=range]{flex:1}
    .tbtns{display:flex;flex-direction:column;gap:8px}
    .tbtn{cursor:pointer;border:none;padding:11px;border-radius:14px;font-weight:800;font-size:.95rem;
      background:#f3ecd6;color:var(--ink);transition:filter .15s}
    .tbtn:hover{filter:brightness(.97)}
    .tbtn.eraser.active{background:#ffd9b0}
    .tbtn.primary{background:linear-gradient(180deg,var(--green),var(--green-d));color:#fff}
    .tbtn.save{background:linear-gradient(180deg,var(--orange),var(--orange-d));color:#fff}

    /* Выбор героя */
    .heroes{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:6px auto 0;max-width:700px}
    .hpick{width:54px;height:54px;border-radius:50%;border:3px solid #fff;cursor:pointer;overflow:hidden;
      box-shadow:var(--shadow);background:#fff}
    .hpick img{width:100%;height:100%;object-fit:cover}
    .hpick.active{outline:3px solid var(--orange);outline-offset:1px}

    .foot{display:flex;justify-content:center;margin:20px 0 50px}
    .back-home{display:inline-flex;padding:12px 28px;border-radius:999px;font-weight:800;color:#fff;
      background:linear-gradient(180deg,var(--green),var(--green-d));box-shadow:var(--shadow)}

    @media(max-width:860px){
      .header{flex-wrap:wrap;gap:8px}.nav{order:3;width:100%}
      .wrap{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <header class="header">
    <a class="logo" href="index.html">
      <span class="logo-imgs"><img src="assets/parts/av_kirpi.jpg" alt=""><img src="assets/parts/av_gofer.jpg" alt=""></span>
      <span class="logo-text"><b><span class="g">Kirpi</span><span class="o">Gofer</span></b><small>мир добрых приключений</small></span>
    </a>
    <nav class="nav">
      <a href="index.html">Главная</a>
      <a href="#">Истории</a>
      <a href="characters.html">Персонажи</a>
      <a href="games.html">Игры</a>
      <a class="active" href="coloring.html">Раскраски</a>
      <a href="#">Родителям</a>
    </nav>
    <div class="actions">
      <a href="#">🔍<small>Поиск</small></a>
      <a href="#">👤<small>Войти</small></a>
    </div>
  </header>

  <div class="page-title">
    <h1>🎨 Раскрась <span class="o">друга</span>!</h1>
    <p>Выбери героя, цвет и закрашивай пальчиком или мышкой</p>
  </div>

  <div class="heroes" id="heroes"></div>

  <div class="wrap">
    <div class="stage" id="stage">
      <canvas id="canvas"></canvas>
      <img class="guide" id="guide" src="assets/color/tissa.jpg" alt="" />
    </div>

    <div class="tools">
      <h3>Цвета</h3>
      <div class="palette" id="palette"></div>
      <div class="row">Кисть <input type="range" id="size" min="6" max="60" value="26"></div>
      <div class="tbtns">
        <button class="tbtn eraser" id="eraser">🧽 Ластик</button>
        <button class="tbtn primary" id="clear">↺ Очистить</button>
        <button class="tbtn save" id="save">⬇️ Сохранить</button>
      </div>
    </div>
  </div>

  <div class="foot"><a class="back-home" href="index.html">← На главную</a></div>

  <script>
    const heroes=[
      {n:"Тисса",img:"tissa"},{n:"Бруно",img:"bruno"},{n:"Лулу",img:"lulu"},
      {n:"Борик",img:"borik"},{n:"Соня",img:"sonya"}
    ];
    const colors=["#e23b3b","#ef7d2e","#f4c430","#7ec850","#2fa36b","#37b6c9",
                  "#3f7bd4","#8a5cd4","#e85d9a","#9a6b3f","#3a3a3a","#ffffff"];
    const canvas=document.getElementById('canvas');
    const ctx=canvas.getContext('2d');
    const guide=document.getElementById('guide');
    let color=colors[0], size=26, erasing=false, drawing=false, last=null;

    // палитра
    const pal=document.getElementById('palette');
    colors.forEach((c,i)=>{
      const b=document.createElement('div'); b.className='sw'+(i===0?' active':'');
      b.style.background=c; b.title=c;
      b.onclick=()=>{color=c;erasing=false;document.getElementById('eraser').classList.remove('active');
        document.querySelectorAll('.sw').forEach(s=>s.classList.remove('active'));b.classList.add('active');};
      pal.appendChild(b);
    });

    // выбор героя
    const hbox=document.getElementById('heroes');
    heroes.forEach((h,i)=>{
      const d=document.createElement('div'); d.className='hpick'+(i===0?' active':'');
      d.innerHTML=`<img src="assets/color/${h.img}.jpg" alt="${h.n}">`;
      d.onclick=()=>{loadHero(h.img);document.querySelectorAll('.hpick').forEach(x=>x.classList.remove('active'));d.classList.add('active');};
      hbox.appendChild(d);
    });

    function setupCanvas(){
      // подгоняем разрешение холста под картинку
      const w=guide.naturalWidth||720, h=guide.naturalHeight||780;
      canvas.width=w; canvas.height=h;
      ctx.clearRect(0,0,w,h);
    }
    function loadHero(name){
      guide.onload=setupCanvas;
      guide.src=`assets/color/${name}.jpg`;
      if(guide.complete) setupCanvas();
    }
    guide.onload=setupCanvas; if(guide.complete) setupCanvas();

    function pos(e){
      const r=canvas.getBoundingClientRect();
      const t=e.touches?e.touches[0]:e;
      return {x:(t.clientX-r.left)/r.width*canvas.width,
              y:(t.clientY-r.top)/r.height*canvas.height};
    }
    function dot(p){
      ctx.globalCompositeOperation = erasing?'destination-out':'source-over';
      ctx.fillStyle=color; ctx.beginPath();
      ctx.arc(p.x,p.y,size,0,Math.PI*2); ctx.fill();
    }
    function line(a,b){
      ctx.globalCompositeOperation = erasing?'destination-out':'source-over';
      ctx.strokeStyle=color; ctx.lineWidth=size*2; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    }
    function down(e){e.preventDefault();drawing=true;last=pos(e);dot(last);}
    function move(e){if(!drawing)return;e.preventDefault();const p=pos(e);line(last,p);last=p;}
    function up(){drawing=false;last=null;}

    canvas.addEventListener('mousedown',down); canvas.addEventListener('mousemove',move);
    window.addEventListener('mouseup',up);
    canvas.addEventListener('touchstart',down,{passive:false});
    canvas.addEventListener('touchmove',move,{passive:false});
    window.addEventListener('touchend',up);

    document.getElementById('size').oninput=e=>size=+e.target.value;
    document.getElementById('eraser').onclick=e=>{erasing=!erasing;e.target.classList.toggle('active',erasing);};
    document.getElementById('clear').onclick=()=>ctx.clearRect(0,0,canvas.width,canvas.height);
    document.getElementById('save').onclick=()=>{
      // склеиваем раскраску + контур и скачиваем
      const out=document.createElement('canvas'); out.width=canvas.width; out.height=canvas.height;
      const o=out.getContext('2d');
      o.fillStyle='#fff'; o.fillRect(0,0,out.width,out.height);
      o.drawImage(canvas,0,0);
      o.globalCompositeOperation='multiply'; o.drawImage(guide,0,0,out.width,out.height);
      const a=document.createElement('a'); a.download='raskraska.png'; a.href=out.toDataURL(); a.click();
    };
  </script>
</body>
</html>
