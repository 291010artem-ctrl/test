<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Раскраски — Мир Кирпи и Гофера</title>
  <style>
    :root{
      --green:#6e9d2f; --green-d:#5a8423; --orange:#e8932e; --orange-d:#d97e16;
      --ink:#5a4a34; --muted:#9a8a72; --shadow:0 10px 30px rgba(120,100,60,.16);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Nunito","Segoe UI",Arial,sans-serif;color:var(--ink);background:#fdf4ea;overflow-x:hidden}
    a{text-decoration:none;color:inherit}
    img{display:block}

    .header{display:flex;align-items:center;gap:24px;padding:10px 30px;background:#fffdf6;
      border-bottom:2px solid #f1e8d0;position:sticky;top:0;z-index:30}
    .logo{display:flex;align-items:center;gap:9px}
    .logo-imgs{display:flex;flex-shrink:0}
    .logo-imgs img{width:40px;height:40px;border-radius:50%;border:2px solid #fff;object-fit:cover;box-shadow:0 2px 6px rgba(90,74,52,.25)}
    .logo-imgs img:nth-child(2){margin-left:-14px}
    .logo-text{display:flex;flex-direction:column;line-height:1.02}
    .logo-text b{font-size:1.45rem;font-weight:900;letter-spacing:.3px}
    .logo-text .g{color:var(--green)}.logo-text .o{color:var(--orange)}
    .logo-text small{font-size:.62rem;font-weight:800;color:#5a4a34;letter-spacing:.3px}
    .nav{display:flex;gap:6px;margin:0 auto;flex-wrap:wrap;justify-content:center}
    .nav a{padding:8px 16px;border-radius:999px;font-weight:800;font-size:1rem;color:var(--ink)}
    .nav a:hover{background:#f3ecd6}
    .nav a.active{background:#f6e3a8;color:var(--green-d)}
    .actions{display:flex;gap:14px}
    .actions a{display:flex;flex-direction:column;align-items:center;font-size:1.3rem;color:var(--ink)}
    .actions small{font-size:.62rem;font-weight:800;color:var(--muted)}

    .page-title{text-align:center;padding:4px 20px 0}
    .page-title h1{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:900}
    .page-title h1 .o{color:var(--orange)}
    .page-title p{color:var(--muted);font-weight:700;margin-top:6px}

    /* Уровни сложности */
    .levels{display:flex;flex-direction:column;gap:8px;margin:0 0 6px}
    .level{cursor:pointer;border:2px solid #eadfbf;background:#fff;border-radius:16px;padding:10px 16px;
      text-align:left;min-width:0;width:100%;box-shadow:var(--shadow);transition:transform .12s,border-color .12s}
    .level:hover{transform:translateY(-2px)}
    .level.active{border-color:var(--green);background:#f4f8ea}
    .level b{display:block;font-size:1.02rem}
    .level small{color:var(--muted);font-weight:700;font-size:.72rem}

    /* Выбор героя */
    .heroes{display:flex;gap:8px;justify-content:flex-start;flex-wrap:wrap;margin:0 0 6px}
    .hpick{width:46px;height:46px;border-radius:50%;border:3px solid #fff;cursor:pointer;overflow:hidden;box-shadow:var(--shadow);background:#fff}
    .hpick img{width:100%;height:100%;object-fit:contain;background:#fff}
    .hpick.active{outline:3px solid var(--orange);outline-offset:1px}

    .wrap{max-width:1180px;margin:10px auto 30px;padding:0 20px;display:grid;
      grid-template-columns:1fr 300px;gap:24px;align-items:start}
    /* холст вписывается в экран по высоте (aspect-ratio задаётся в JS) */
    .stage{position:relative;background:#fff;border:3px solid #eadfbf;border-radius:22px;
      overflow:hidden;box-shadow:var(--shadow);touch-action:none;
      max-width:100%;max-height:82vh;justify-self:start}
    .stage canvas,.stage .guide,.stage .ref,.stage .prev{position:absolute;inset:0;width:100%;height:100%}
    .stage canvas{cursor:crosshair}
    .stage .guide{mix-blend-mode:multiply;pointer-events:none}
    .stage .ref{pointer-events:none;opacity:0;transition:opacity .12s}
    .stage .prev{pointer-events:none}
    .author{width:100%;border:2px solid #eadfbf;border-radius:12px;padding:9px 12px;font:inherit;font-weight:700;margin-bottom:12px}
    .author:focus{outline:2px solid var(--green);border-color:var(--green)}

    .tools{background:#fff;border:3px solid #eadfbf;border-radius:22px;padding:16px;box-shadow:var(--shadow)}
    .tools h3{font-size:1rem;margin:12px 0 8px;color:var(--green-d)}.tools h3:first-child{margin-top:0}
    .palette{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
    .palhead{font-size:.72rem;font-weight:800;color:var(--muted);margin-top:2px}
    .palrow{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
    .sw{width:100%;aspect-ratio:1;border-radius:50%;border:3px solid #fff;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.15);transition:transform .12s}
    .sw:hover{transform:scale(1.1)}
    .sw.active{outline:3px solid var(--green);outline-offset:1px}
    .row{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-weight:800;font-size:.9rem}
    .row input[type=range]{flex:1}
    .tbtns{display:flex;flex-direction:column;gap:8px}
    .tbtn{cursor:pointer;border:none;padding:11px;border-radius:14px;font-weight:800;font-size:.95rem;background:#f3ecd6;color:var(--ink);transition:filter .15s}
    .tbtn:hover{filter:brightness(.97)}
    .tbtn.eraser.active{background:#ffd9b0}
    .tbtn.primary{background:linear-gradient(180deg,var(--green),var(--green-d));color:#fff}
    .tbtn.save{background:linear-gradient(180deg,var(--orange),var(--orange-d));color:#fff}
    .hint{font-size:.8rem;color:var(--muted);font-weight:700;margin-bottom:12px;line-height:1.3}

    .foot{display:flex;justify-content:center;margin:20px 0 50px}
    .back-home{display:inline-flex;padding:12px 28px;border-radius:999px;font-weight:800;color:#fff;
      background:linear-gradient(180deg,var(--green),var(--green-d));box-shadow:var(--shadow)}

    @media(max-width:860px){
      .header{flex-wrap:wrap;gap:8px}.nav{order:3;width:100%}
      .wrap{grid-template-columns:1fr}
    }
  </style>
  <link rel="stylesheet" href="assets/theme.css?v=11" />
  <script src="assets/theme.js?v=11"></script>
</head>
<body>
  <header class="header">
    <a class="logo" href="index.html">
      <span class="logo-imgs"><img src="assets/parts/av_kirpi.jpg" alt=""><img src="assets/parts/av_gofer.jpg" alt=""></span>
      <span class="logo-text"><b><span class="g">Kirpi</span><span class="o">Gofer</span></b><small>мир добрых приключений</small></span>
    </a>
    <nav class="nav">
      <a href="index.html">Главная</a>
      <a href="#">Истории</a>
      <a href="characters.html">Персонажи</a>
      <a href="games.html">Игры</a>
      <a class="active" href="coloring.html">Раскраски</a>
      <a href="stickers.html">Копилка</a>
      <a href="parents.html">Родителям</a>
    </nav>
    <div class="actions">
      <a href="#">🔍<small>Поиск</small></a>
    </div>
  </header>

  <div class="page-title">
    <h1>🎨 Раскрась <span class="o">друга</span>!</h1>
  </div>

  <div class="wrap">
    <!-- ХОЛСТ слева, большой -->
    <div class="stage" id="stage">
      <canvas id="canvas"></canvas>
      <canvas id="prev" class="prev"></canvas>
      <img class="guide" id="guide" src="assets/color/tissa.jpg" alt="" />
      <img class="ref" id="ref" src="assets/chars/tissa.jpg" alt="" />
    </div>

    <!-- ВСЕ ФУНКЦИИ справа -->
    <aside class="tools">
      <h3>Выбери героя</h3>
      <div class="heroes" id="heroes"></div>

      <h3>Уровень</h3>
      <div class="levels" id="levels">
        <div class="level active" data-mode="easy"><b>🟢 Лёгкий</b><small>Нажми на область — закрасится</small></div>
        <div class="level" data-mode="medium"><b>🟡 Средний</b><small>Веди кистью — зона зальётся ровно</small></div>
        <div class="level" data-mode="pro"><b>🔴 Профи</b><small>Рисуй сам</small></div>
      </div>

      <h3>Цвета</h3>
      <div class="palette" id="palette"></div>
      <p class="hint" id="hint"></p>
      <div class="row" id="sizeRow">Кисть <input type="range" id="size" min="6" max="60" value="26"></div>
      <div class="row">👀 Образец <input type="range" id="refOp" min="0" max="100" value="0"></div>
      <h3>Имя художника</h3>
      <input class="author" id="author" maxlength="24" placeholder="Например: Артём" />
      <div class="tbtns">
        <button class="tbtn eraser" id="eraser">🧽 Ластик</button>
        <button class="tbtn primary" id="clear">↺ Очистить</button>
        <button class="tbtn save" id="save">⬇️ Сохранить рисунок</button>
      </div>
    </aside>
  </div>

  <div class="foot"><a class="back-home" href="index.html">← На главную</a></div>

  <script>
    const heroes=[
      {n:"Тисса",img:"tissa"},{n:"Бруно",img:"bruno"},{n:"Лулу",img:"lulu"},
      {n:"Борик",img:"borik"},{n:"Соня",img:"sonya"}
    ];
    // цвета каждого героя (то, чем он раскрашен)
    const charPal={
      tissa:["#b8460f","#e08334","#f4c089","#f6efd0","#6e2a0c"],
      bruno:["#7a3a12","#a95b27","#e0b483","#2775a9","#3a2a1a"],
      lulu:["#dd5b0d","#f77527","#a9410d","#f6efd0","#6e2a0c"],
      borik:["#3a2a2a","#7a7a7a","#e8e4d2","#5b5b27","#bcbcbc"],
      sonya:["#8f5b27","#c38f5b","#a97541","#7a5a8f","#5b4127"]
    };
    // общий ряд — можно красить и другими цветами
    const general=["#e23b3b","#f4c430","#7ec850","#37b6c9","#3f7bd4","#8a5cd4","#e85d9a","#3a3a3a","#ffffff"];
    const hints={
      easy:"Нажимай на части рисунка — каждая область закрасится выбранным цветом.",
      medium:"Води кистью по рисунку. Отпустишь — задетые области аккуратно зальются ровно по контуру.",
      pro:"Рисуй свободно кистью. Меняй размер кисти и цвет."
    };

    const canvas=document.getElementById('canvas');
    const ctx=canvas.getContext('2d',{willReadFrequently:true});
    const prev=document.getElementById('prev');
    const pctx=prev.getContext('2d');
    const stage=document.getElementById('stage');
    const guide=document.getElementById('guide');
    let mode='easy', color="#b8460f", size=26, erasing=false, drawing=false, last=null, medPts=[];
    let curHero='tissa';
    let gData=null, W=0, H=0;
    const off=document.createElement('canvas'), offc=off.getContext('2d',{willReadFrequently:true});

    // палитра под выбранного героя + общий ряд
    function renderPalette(name){
      const pal=document.getElementById('palette'); pal.innerHTML='';
      [['Цвета героя',charPal[name]||[]],['Другие цвета',general]].forEach(([label,arr])=>{
        if(!arr.length)return;
        const t=document.createElement('div'); t.className='palhead'; t.textContent=label; pal.appendChild(t);
        const row=document.createElement('div'); row.className='palrow';
        arr.forEach(c=>{
          const b=document.createElement('div'); b.className='sw'; b.style.background=c;
          b.onclick=()=>{color=c;erasing=false;document.getElementById('eraser').classList.remove('active');
            document.querySelectorAll('.sw').forEach(s=>s.classList.remove('active'));b.classList.add('active');};
          row.appendChild(b);
        });
        pal.appendChild(row);
      });
      const first=pal.querySelector('.sw'); if(first){first.classList.add('active'); color=(charPal[name]||general)[0];}
    }
    // герои
    const hbox=document.getElementById('heroes');
    heroes.forEach((h,i)=>{
      const d=document.createElement('div'); d.className='hpick'+(i===0?' active':'');
      d.innerHTML=`<img src="assets/color/${h.img}.jpg" alt="${h.n}">`;
      d.onclick=()=>{loadHero(h.img);document.querySelectorAll('.hpick').forEach(x=>x.classList.remove('active'));d.classList.add('active');};
      hbox.appendChild(d);
    });
    // уровни
    document.querySelectorAll('.level').forEach(l=>{
      l.onclick=()=>{mode=l.dataset.mode;
        document.querySelectorAll('.level').forEach(x=>x.classList.remove('active'));l.classList.add('active');
        document.getElementById('hint').textContent=hints[mode];
        document.getElementById('sizeRow').style.display = (mode==='pro'||mode==='medium')?'flex':'none';
      };
    });
    document.getElementById('hint').textContent=hints.easy;
    document.getElementById('sizeRow').style.display='none';

    function loadHero(name){
      curHero=name;
      const im=new Image();
      im.onload=()=>{
        W=im.naturalWidth; H=im.naturalHeight;
        canvas.width=W; canvas.height=H; off.width=W; off.height=H;
        prev.width=W; prev.height=H;
        fitStage();                                  // размер холста под экран
        ctx.clearRect(0,0,W,H); pctx.clearRect(0,0,W,H);
        offc.drawImage(im,0,0);
        gData=offc.getImageData(0,0,W,H).data;     // контур (границы)
        guide.src=im.src;
        document.getElementById('ref').src=`assets/chars/${name}.jpg`;  // образец (раскрашенный)
        renderPalette(name);                                            // палитра под этого героя
      };
      im.src=`assets/color/${name}.jpg`;
    }
    guide.addEventListener('load',()=>{ if(!gData) loadHero('tissa'); });
    loadHero('tissa');

    // подгоняем холст: по ширине колонки, но не выше ~62% экрана
    function fitStage(){
      if(!W) return;
      stage.style.width=''; stage.style.height='';
      const availW = stage.clientWidth || 360;
      const maxH = window.innerHeight*0.82;
      let dw = Math.min(availW, 600), dh = dw*H/W;
      if(dh>maxH){ dh=maxH; dw=dh*W/H; }
      stage.style.width=Math.round(dw)+'px'; stage.style.height=Math.round(dh)+'px';
    }
    window.addEventListener('resize',fitStage);

    function hexRGB(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
    function isBoundary(p){const i=p*4;return (gData[i]+gData[i+1]+gData[i+2])/3 < 105;}

    function pos(e){
      const r=canvas.getBoundingClientRect(); const t=e.touches?e.touches[0]:e;
      return {x:Math.floor((t.clientX-r.left)/r.width*W), y:Math.floor((t.clientY-r.top)/r.height*H)};
    }

    // Заливка области по контуру (для Лёгкого и Среднего)
    function fillAt(sx,sy){
      if(!gData||sx<0||sy<0||sx>=W||sy>=H)return;
      const start=sy*W+sx;
      if(isBoundary(start))return;
      const img=ctx.getImageData(0,0,W,H); const pd=img.data;
      const [fr,fg,fb]=erasing?[0,0,0]:hexRGB(color);
      // если уже этот цвет — не заливаем повторно
      const si=start*4;
      if(!erasing && pd[si+3]===255 && pd[si]===fr && pd[si+1]===fg && pd[si+2]===fb) return;
      const seen=new Uint8Array(W*H); const st=[start];
      while(st.length){
        const p=st.pop(); if(seen[p])continue; seen[p]=1;
        if(isBoundary(p))continue;
        const i=p*4;
        if(erasing){pd[i+3]=0;} else {pd[i]=fr;pd[i+1]=fg;pd[i+2]=fb;pd[i+3]=255;}
        const x=p%W, y=(p-x)/W;
        if(x>0)st.push(p-1); if(x<W-1)st.push(p+1);
        if(y>0)st.push(p-W); if(y<H-1)st.push(p+W);
      }
      ctx.putImageData(img,0,0);
    }

    // Кисть по нужному холсту (c). Для Профи — основной, для Среднего — предпросмотр.
    function brushOn(c,a,b,col){
      c.globalCompositeOperation = (erasing && c===ctx)?'destination-out':'source-over';
      c.strokeStyle=col; c.fillStyle=col; c.lineCap='round'; c.lineJoin='round'; c.lineWidth=size*2;
      c.beginPath();
      if(b){c.moveTo(a.x,a.y);c.lineTo(b.x,b.y);c.stroke();}
      else {c.arc(a.x,a.y,size,0,Math.PI*2);c.fill();}
      c.globalCompositeOperation='source-over';
    }

    function down(e){e.preventDefault();drawing=true;const p=pos(e);last=p;
      if(mode==='easy'){fillAt(p.x,p.y);drawing=false;}
      else if(mode==='medium'){medPts=[p]; brushOn(pctx,p,null,color);}   // предпросмотр мазка
      else brushOn(ctx,p,null,color);                                    // Профи
    }
    function move(e){if(!drawing)return;e.preventDefault();const p=pos(e);
      if(mode==='medium'){brushOn(pctx,last,p,color); medPts.push(p);}    // ведём кисть (предпросмотр)
      else if(mode==='pro'){brushOn(ctx,last,p,color);}
      last=p;
    }
    function up(){
      if(mode==='medium' && drawing){
        pctx.clearRect(0,0,W,H);                  // убираем мазки-предпросмотр
        for(const q of medPts) fillAt(q.x,q.y);   // и аккуратно заливаем задетые области
        medPts=[];
      }
      drawing=false; last=null;
    }

    canvas.addEventListener('mousedown',down); canvas.addEventListener('mousemove',move);
    window.addEventListener('mouseup',up);
    canvas.addEventListener('touchstart',down,{passive:false});
    canvas.addEventListener('touchmove',move,{passive:false});
    window.addEventListener('touchend',up);

    document.getElementById('size').oninput=e=>size=+e.target.value;
    document.getElementById('refOp').oninput=e=>document.getElementById('ref').style.opacity=e.target.value/100;
    document.getElementById('eraser').onclick=e=>{erasing=!erasing;e.target.classList.toggle('active',erasing);};
    document.getElementById('clear').onclick=()=>{ctx.clearRect(0,0,W,H);pctx.clearRect(0,0,W,H);};

    document.getElementById('save').onclick=()=>{
      const fh=Math.round(W*0.12);                 // полоса с подписью внизу
      const out=document.createElement('canvas'); out.width=W; out.height=H+fh;
      const o=out.getContext('2d');
      o.fillStyle='#fff'; o.fillRect(0,0,W,H+fh);
      o.drawImage(canvas,0,0);                      // раскраска ребёнка
      o.globalCompositeOperation='multiply'; o.drawImage(guide,0,0,W,H);  // контур сверху
      o.globalCompositeOperation='source-over';
      // подпись-плашка со знаком сайта и автором
      o.fillStyle='#f4f8ea'; o.fillRect(0,H,W,fh);
      o.fillStyle='#eadfbf'; o.fillRect(0,H,W,3);
      o.textBaseline='middle';
      o.fillStyle='#5a8423'; o.font=`900 ${Math.round(fh*0.30)}px Nunito,Arial`;
      o.fillText('🌿 Мир Кирпи и Гофера', W*0.04, H+fh*0.36);
      o.fillStyle='#5a4a34'; o.font=`bold ${Math.round(fh*0.26)}px Nunito,Arial`;
      const name=(document.getElementById('author').value||'').trim();
      o.fillText(name ? ('Художник: '+name) : 'Моя раскраска ✏️', W*0.04, H+fh*0.74);
      o.fillStyle='#9a8a72'; o.font=`bold ${Math.round(fh*0.2)}px Nunito,Arial`;
      o.textAlign='right'; o.fillText('kirpigofer • раскраски', W*0.96, H+fh*0.5); o.textAlign='left';
      const a=document.createElement('a'); a.download='moya-raskraska.png'; a.href=out.toDataURL(); a.click();
      // наклейка-награда за сохранённый рисунок
      if(window.KG){ const map={tissa:'tisa',bruno:'bruno',lulu:'lulu',borik:'borik',sonya:'sonya'};
        KG.award(map[curHero]||'kirpi'); }
    };
  </script>
  <script src="assets/kg.js?v=11"></script>
</body>
</html>
